 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Subasta Futbolera 412 - Multijugador</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            text-align: center;
            padding: 10px;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 20px auto;
            background: #131a2e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 0px 25px rgba(0, 255, 102, 0.15);
        }
        h1 { color: #00ff66; margin: 0 0 5px 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        .setup-screen { padding: 30px 10px; }
        .setup-screen select { padding: 10px 20px; font-size: 16px; border-radius: 5px; background: #1f294d; color: white; border: 1px solid #00ff66; cursor: pointer; }
        .game-layout { display: none; grid-template-columns: 1fr; gap: 20px; margin-top: 15px; }
        @media(min-width: 768px) { .game-layout { grid-template-columns: 280px 1fr; } }
        
        /* Marcadores de Jugadores */
        .players-sidebar { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        @media(min-width: 768px) { .players-sidebar { display: flex; flex-direction: column; gap: 12px; } }
        .player-card { background: #1f294d; padding: 12px; border-radius: 10px; border-left: 5px solid #555; text-align: left; transition: 0.3s; }
        .player-card.active-bidder { border-left-color: #ffcc00; box-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }
        .player-name { font-weight: bold; font-size: 15px; color: #fff; margin-bottom: 3px; }
        .player-budget { color: #ffcc00; font-size: 16px; font-weight: bold; }
        
        /* Panel Central de Subasta */
        .auction-panel { background: #1a2342; border-radius: 12px; padding: 20px; border: 1px solid #2a3765; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card-display { background: #111827; border: 2px dashed #00ff66; border-radius: 12px; width: 100%; max-width: 400px; padding: 25px 15px; box-sizing: border-box; margin-bottom: 20px; }
        .silueta { font-size: 70px; margin-bottom: 10px; transition: transform 0.3s; }
        .silueta.hidden { filter: brightness(0) drop-shadow(0 0 2px #fff); }
        .stats-text { font-size: 16px; color: #cbd5e1; min-height: 50px; line-height: 1.4; margin: 15px 0; font-style: italic; }
        
        /* Precios y Ofertas */
        .price-row { display: flex; justify-content: space-around; width: 100%; max-width: 400px; margin-bottom: 20px; background: #111827; padding: 10px; border-radius: 8px; }
        .price-box { font-size: 14px; color: #94a3b8; }
        .price-box span { display: block; font-size: 20px; font-weight: bold; }
        .base-val span { color: #38bdf8; }
        .curr-val span { color: #ffcc00; }
        
        /* Botones de Puja */
        .bid-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; width: 100%; margin-bottom: 20px; }
        .btn-bid { background: #2563eb; color: white; border: none; padding: 10px; font-size: 13px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-bid:hover:not(:disabled) { background: #1d4ed8; }
        .btn-bid:disabled { background: #374151; color: #94a3b8; cursor: not-allowed; }
        
        /* Botones de Control */
        .control-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn { background: #00ff66; color: #000; border: none; padding: 12px 25px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn:hover:not(:disabled) { background: #00cc52; }
        .btn:disabled { background: #4b5563; color: #9ca3af; cursor: not-allowed; }
        .btn-action { background: #eab308; }
        .btn-action:hover:not(:disabled) { background: #ca8a04; }
        
        /* Lista de Equipos Comprados */
        .teams-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-top: 25px; border-top: 1px solid #2a3765; padding-top: 20px; }
        .team-box { background: #1f294d; padding: 10px; border-radius: 8px; text-align: left; }
        .team-box h4 { margin: 0 0 8px 0; color: #00ff66; border-bottom: 1px solid #2a3765; padding-bottom: 4px; font-size: 14px; }
        .team-box ul { list-style: none; padding: 0; margin: 0; font-size: 13px; color: #e2e8f0; }
        .team-box li { margin-bottom: 4px; padding: 2px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>La Subasta 412</h1>
    <p style="color: #94a3b8; margin: 0 0 15px 0; font-size: 14px;">Edición Crack Mundial Histórico</p>

    <!-- Pantalla de Configuración Inicial -->
    <div class="setup-screen" id="setup-screen">
        <p style="font-size: 18px; margin-bottom: 15px;">¿Cuántos van a jugar en la mesa?</p>
        <select id="player-count">
            <option value="2">2 Jugadores</option>
            <option value="3">3 Jugadores</option>
            <option value="4" selected>4 Jugadores</option>
            <option value="5">5 Jugadores</option>
        </select>
        <br><br>
        <button class="btn" onclick="startGame()">Iniciar Subasta</button>
    </div>

    <!-- Pantalla de Juego Principal -->
    <div class="game-layout" id="game-layout">
        
        <!-- Barra lateral con presupuestos -->
        <div class="players-sidebar" id="players-sidebar"></div>

        <!-- Panel de Subasta Central -->
        <div class="auction-panel">
            <h3 id="round-title" style="margin: 0 0 10px 0; color: #38bdf8;">Jugador Oculto 1 de 6</h3>
            
            <div class="card-display">
                <div class="silueta hidden" id="player-icon">👤</div>
                <div class="stats-text" id="player-stats">Cargando pistas...</div>
            </div>

            <div class="price-row">
                <div class="price-box base-val">Precio Base<span id="base-price">€0M</span></div>
                <div class="price-box curr-val">Oferta Actual<span id="current-bid">€0M</span></div>
            </div>

            <p style="font-size: 12px; color: #a1a1aa; margin: 0 0 8px 0;">Pujar por Jugador (+€5M):</p>
            <!-- Botones de puja dinámicos -->
            <div class="bid-grid" id="bid-buttons-container"></div>

            <div class="control-btns">
                <button class="btn btn-action" id="reveal-btn" onclick="revealPlayer()" disabled>👁️ Revelar Jugador</button>
                <button class="btn" id="next-btn" onclick="nextRound()" disabled>Siguiente Opcióon ➡️</button>
            </div>
        </div>
    </div>

    <!-- Lista de los equipos armados abajo -->
    <div class="teams-grid" id="teams-grid" style="display: none;"></div>
</div>

<script>
    let playersData = [];
    let currentRound = 0;
    let basePrice = 0;
    let currentBid = 0;
    let highestBidder = null;
    let isRevealed = false;

    // Banco de datos gigante de futbolistas con pistas al estilo 412
    const poolJugadores = [
        { name: "Lionel Messi", stats: "Extremo/MCO. Ganó 8 Balones de Oro, anotó 91 goles en un solo año natural (2012) y conquistó el Mundial.", icon: "🇦🇷" },
        { name: "Cristiano Ronaldo", stats: "Delantero. Máximo goleador histórico del fútbol profesional, Mr. Champions con 5 copas y Eurocopa obtenida.", icon: "🇵🇹" },
        { name: "Zinedine Zidane", stats: "Medio Centro. Campeón del mundo en 1998 metiendo dos goles de cabeza en la final, magia pura y elegancia en el Madrid.", icon: "🇫🇷" },
        { name: "Ronaldo Nazário", stats: "Centrodelantero. 'El Fenómeno'. Campeón y goleador de Corea-Japón 2002 con un corte de pelo histórico.", icon: "🇧🇷" },
        { name: "Ronaldinho", stats: "Extremo izquierdo. Magia pura, joga bonito, ganó Champions, Mundial, Libertadores y fue aplaudido en el Bernabéu.", icon: "🇧🇷" },
        { name: "Diego Maradona", stats: "Enganche. Lideró a su país en México 1986 marcando el mejor gol de la historia de los mundiales y la famosa Mano de Dios.", icon: "🇦🇷" }
    ];

    function startGame() {
        const count = parseInt(document.getElementById("player-count").value);
        document.getElementById("setup-screen").style.display = "none";
        document.getElementById("game-layout").style.display = "grid";
        document.getElementById("teams-grid").style.display = "grid";

        // Crear la estructura de datos para los jugadores de la mesa
        playersData = [];
        for (let i = 1; i <= count; i++) {
            playersData.push({
                id: i,
                name: `Jugador ${i}`,
                budget: 1000, // 1000 millones
                team: []
            });
        }

        buildSidebarAndTeams();
        setupRound();
    }

    function buildSidebarAndTeams() {
        const sidebar = document.getElementById("players-sidebar");
        const teamsGrid = document.getElementById("teams-grid");
        sidebar.innerHTML = "";
        teamsGrid.innerHTML = "";

        playersData.forEach(p => {
            // Tarjetas laterales
            let card = document.createElement("div");
            card.className = "player-card";
            card.id = `sidebar-player-${p.id}`;
            card.innerHTML = `
                <div class="player-name">👤 ${p.name}</div>
                <div class="player-budget">€${p.budget}M</div>
            `;
            sidebar.appendChild(card);

            // Secciones de equipos abajo
            let teamBox = document.createElement("div");
            teamBox.className = "team-box";
            teamBox.innerHTML = `
